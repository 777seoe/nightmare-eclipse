name: Build MiniPlasma

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: |
          Remove-Item -Recurse -Force MiniPlasma\packages -ErrorAction SilentlyContinue
          nuget restore MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln -PackagesDirectory MiniPlasma\packages
        shell: pwsh

      - name: Build single-file release (Costura.Fody merged)
        run: >
          msbuild MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln
          /p:Configuration=Release
          /p:Platform="Any CPU"
          /p:SignManifests=false
          /p:Optimize=true

      - name: Create GitHub Release and upload EXE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exePath = "MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP\bin\Release\PoC_AbortHydration_ArbitraryRegKey_EoP.exe"
          $tag = "v1.0-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          gh release create $tag $exePath `
            --title "MiniPlasma v1.0" `
            --notes "Single-file build. All dependencies (NtApiDotNet, TaskScheduler) embedded via Costura.Fody." `
            --repo $env:GITHUB_REPOSITORY
          Write-Output "Release created with tag: $tag"
        shell: pwsh