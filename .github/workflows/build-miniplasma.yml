name: Build MiniPlasma

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── Restore packages once (reused for both builds) ────────────────────
      - name: Restore NuGet packages
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force MiniPlasma\packages -ErrorAction SilentlyContinue
          nuget restore MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln -PackagesDirectory MiniPlasma\packages

      # ── EXE build ──────────────────────────────────────────────────────────
      - name: Build EXE (Costura single-file)
        run: >
          msbuild MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln
          /p:Configuration=Release /p:Platform="Any CPU"
          /p:SignManifests=false /p:Optimize=true

      - name: Stage EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          Copy-Item "MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP\bin\Release\PoC_AbortHydration_ArbitraryRegKey_EoP.exe" staging\

      # ── Patch project for DLL ─────────────────────────────────────────────
      - name: Add Export.cs and patch csproj
        shell: pwsh
        run: |
          $projDir = "MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP"

          # Export.cs: plain class, no [DllExport] needed (export injected post-build)
          $exportCs = "using System;`nusing System.Runtime.InteropServices;`nusing System.Threading;`nnamespace PoC_AbortHydration_ArbitraryRegKey_EoP`n{`n    public class DllEntryPoint`n    {`n        public static void Start(IntPtr hwnd, IntPtr hinst,`n            [MarshalAs(UnmanagedType.LPStr)] string lpszCmdLine, int nCmdShow)`n        {`n            new Thread(() => {`n                try {`n                    typeof(Program)`n                        .GetMethod(`"Main`",`n                            System.Reflection.BindingFlags.Static |`n                            System.Reflection.BindingFlags.NonPublic)`n                        ?.Invoke(null, new object[] { new string[0] });`n                } catch { }`n            }) { IsBackground = true }.Start();`n        }`n    }`n}"
          [IO.File]::WriteAllText("$projDir\Export.cs", $exportCs, [Text.Encoding]::UTF8)

          # Add Export.cs to csproj
          $csprojPath = "$projDir\PoC_AbortHydration_ArbitraryRegKey_EoP.csproj"
          $csproj = [IO.File]::ReadAllText($csprojPath)
          $csproj = $csproj.Replace('<Compile Include="Program.cs" />', '<Compile Include="Export.cs" /><Compile Include="Program.cs" />')
          [IO.File]::WriteAllText($csprojPath, $csproj, [Text.Encoding]::UTF8)
          Write-Output "Export.cs added to project"

      # ── DLL build ─────────────────────────────────────────────────────────
      - name: Build DLL (x64, Costura-merged, no export yet)
        run: >
          msbuild "MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP\PoC_AbortHydration_ArbitraryRegKey_EoP.csproj"
          /p:Configuration=Release /p:Platform=x64
          /p:PlatformTarget=x64
          /p:OutputPath=bin\x64\Release\
          /p:OutputType=Library
          /p:SignManifests=false /p:Optimize=true

      # ── Inject Start() export via ildasm/ilasm ────────────────────────────
      - name: Inject native Start() export (ildasm + ilasm)
        shell: pwsh
        run: |
          $dllIn = "MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP\bin\x64\Release\PoC_AbortHydration_ArbitraryRegKey_EoP.dll"
          $work  = "$env:TEMP\il_export"
          New-Item -ItemType Directory -Force $work | Out-Null

          # Find ildasm (prefer x64, avoid ARM)
          $ildasm = Get-ChildItem "C:\Program Files (x86)\Microsoft SDKs\Windows" -Recurse -Filter "ildasm.exe" -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -notmatch "arm" } |
                    Sort-Object { if ($_.FullName -match "x64") { 0 } else { 1 } } |
                    Select-Object -First 1
          if (-not $ildasm) { throw "ildasm.exe not found" }
          Write-Output "ildasm: $($ildasm.FullName)"

          # ilasm (64-bit)
          $ilasm = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\ilasm.exe"
          if (-not (Test-Path $ilasm)) { throw "ilasm.exe not found" }

          # Disassemble
          $ilPath = "$work\poc.il"
          & $ildasm.FullName /all /nobar "/output=$ilPath" $dllIn
          $ilSize = (Get-Item $ilPath).Length
          Write-Output "Disassembled — IL size: $ilSize bytes"

          # Patch IL (string-based, no regex — avoids timeout on large IL file)
          $il = [IO.File]::ReadAllText($ilPath)

          # 1. Find the main .module line (not .module extern) and insert vtfixup after it
          $nlModule = "`r`n.module "
          $searchFrom = 0
          $moduleEnd = -1
          while ($true) {
              $idx = $il.IndexOf($nlModule, $searchFrom)
              if ($idx -lt 0) { break }
              $lineContent = $il.Substring($idx + 2)  # skip \r\n
              if (-not $lineContent.StartsWith(".module extern")) {
                  # Found the main .module line — find its end
                  $lineEndIdx = $il.IndexOf("`r`n", $idx + 2)
                  if ($lineEndIdx -lt 0) { $lineEndIdx = $il.Length }
                  $moduleEnd = $lineEndIdx
                  break
              }
              $searchFrom = $idx + 1
          }
          if ($moduleEnd -ge 0) {
              $vtfixup = "`r`n.vtfixup [1] int64 fromunmanaged at VT_01`r`n.data VT_01 = int64(0)"
              $il = $il.Substring(0, $moduleEnd) + $vtfixup + $il.Substring($moduleEnd)
              Write-Output "vtfixup injected"
          } else { Write-Output "WARNING: .module line not found" }

          # 2. Find Start() method and inject .vtentry / .export after its opening brace
          $startSig = "void  Start("  # ildasm uses double-space after void
          $sigIdx = $il.IndexOf($startSig)
          if ($sigIdx -lt 0) { $startSig = "void Start("; $sigIdx = $il.IndexOf($startSig) }
          if ($sigIdx -ge 0) {
              $cilIdx   = $il.IndexOf("cil managed", $sigIdx)
              $braceIdx = $il.IndexOf("{", $cilIdx)
              if ($braceIdx -ge 0) {
                  $inject = "`r`n    .vtentry 1 : 1`r`n    .export [1] as Start"
                  $il = $il.Substring(0, $braceIdx + 1) + $inject + $il.Substring($braceIdx + 1)
                  Write-Output ".vtentry/.export injected into Start()"
              } else { Write-Output "WARNING: opening brace for Start() not found" }
          } else { Write-Output "WARNING: Start() method signature not found" }

          $modIl = "$work\poc_export.il"
          [IO.File]::WriteAllText($modIl, $il)
          Write-Output "IL patched and written"

          # Reassemble (include .res if present)
          $resFile = "$work\poc.res"
          $outDll  = "$work\output.dll"
          $args = @("/dll", "/x64", "/optimize", "/nologo", "/output=$outDll")
          if (Test-Path $resFile) { $args += "/resource=$resFile" }
          $args += $modIl
          & $ilasm @args

          if (Test-Path $outDll) {
              Copy-Item $outDll "staging\PoC_AbortHydration_ArbitraryRegKey_EoP.dll"
              $sz = (Get-Item "staging\PoC_AbortHydration_ArbitraryRegKey_EoP.dll").Length
              Write-Output "DLL staged: $sz bytes"
          } else {
              throw "ilasm failed — output DLL not found"
          }

      - name: List staging artifacts
        shell: pwsh
        run: Get-ChildItem staging\ | Format-Table Name, Length

      # ── Publish public release ─────────────────────────────────────────────
      - name: Create GitHub Release (EXE + DLL)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v2.0-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          gh release create $tag staging\* `
            --title "MiniPlasma v2.0 - EXE + DLL" `
            --notes "EXE: Costura single-file. DLL: x64, exports Start() (rundll32-compatible), all deps embedded via Costura.Fody, export injected via ildasm/ilasm." `
            --repo $env:GITHUB_REPOSITORY
          Write-Output "Release: $tag"
