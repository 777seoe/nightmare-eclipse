name: Build MiniPlasma

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: |
          Remove-Item -Recurse -Force MiniPlasma\packages -ErrorAction SilentlyContinue
          nuget restore MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln -PackagesDirectory MiniPlasma\packages
        shell: pwsh

      - name: Build single-file release (Costura.Fody merged)
        run: >
          msbuild MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP.sln
          /p:Configuration=Release
          /p:Platform="Any CPU"
          /p:SignManifests=false
          /p:Optimize=true

      - name: Show output files
        run: Get-ChildItem MiniPlasma\PoC_AbortHydration_ArbitraryRegKey_EoP\bin\Release\ | Format-Table Name, Length
        shell: pwsh

      - name: Upload single EXE
        uses: actions/upload-artifact@v4
        with:
          name: MiniPlasma-SingleFile
          path: MiniPlasma/PoC_AbortHydration_ArbitraryRegKey_EoP/bin/Release/PoC_AbortHydration_ArbitraryRegKey_EoP.exe